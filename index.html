<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRILL 1</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .container{
                height: 230px;
                max-width: 50%;
                background-color: rgb(255, 213, 235);
                text-align: center;
                font-family: 'Poppins';
                border-radius: 20px;
                padding: 10px;
                margin-top: 150px;
                border: 2px dotted rgb(185, 106, 106);
        }
        h1{
                border: 2px dotted rgb(255, 186, 208);
                background-color: rgb(255, 255, 255);
                border-radius: 20px;
                font-family: 'Poppins';
        }
        #display{
                font-family: 'Times New Roman', Times, serif;
                font-size: 50px;
        }
        button{
                background-color: rgb(255, 255, 255);
                border-radius: 20px;
        }
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   
    <div class="container">
    <h1>Basic Calculator</h1>
    <p id="paral">Click the botton to display the product of two numbers.</p>

    <script>
            let X = 300;
            let Z = 38;
            let prod = X % Z;
    </script>

    <button type="button" onclick="document.getElementById ('display').innerHTML='<kbd>' + prod + '</kbd>' ">Display</button>
    
    <br><br><br>

    <p id="display"></p>
    </div>
</body>
</html>
